<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Barcode Barang</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #reader {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .form-group {
            margin-top: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
        .status {
            margin-top: 10px;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner & Input Barang</h2>
    
    <div id="reader"></div>
    
    <div class="form-group">
        <label for="barcode-result">Hasil Scan (Kode Barcode):</label>
        <input type="text" id="barcode-result" readonly placeholder="Scan barcode untuk mengisi...">
    </div>

    <div class="form-group">
        <label for="product-name">Nama Barang:</label>
        <input type="text" id="product-name" placeholder="Masukkan nama barang...">
    </div>

    <button id="save-btn" onclick="saveData()">Simpan Data Barang</button>
    
    <div id="status-message" class="status"></div>
</div>

<script>
    // Variabel global untuk menyimpan kode barcode yang aktif
    let activeBarcode = "";

    // Fungsi yang otomatis berjalan saat barcode sukses ter-scan
    function onScanSuccess(decodedText, decodedResult) {
        activeBarcode = decodedText;
        document.getElementById('barcode-result').value = decodedText;
        
        // 4. Cek apakah barcode ini sudah pernah disimpan sebelumnya
        let savedData = localStorage.getItem('barang_data');
        let database = savedData ? JSON.parse(savedData) : {};

        if (database[decodedText]) {
            // Jika barcode sudah terdaftar, langsung munculkan namanya
            document.getElementById('product-name').value = database[decodedText];
            document.getElementById('status-message').innerText = "Barang ditemukan di sistem!";
            document.getElementById('status-message').style.color = "#0056b3";
        } else {
            // Jika barcode baru, kosongkan input nama barang agar bisa diisi
            document.getElementById('product-name').value = "";
            document.getElementById('product-name').focus();
            document.getElementById('status-message').innerText = "Barcode baru terdeteksi. Silakan input nama barang.";
            document.getElementById('status-message').style.color = "#e67e22";
        }
    }

    // Fungsi untuk menyimpan data ke LocalStorage
    function saveData() {
        let barcode = document.getElementById('barcode-result').value;
        let namaBarang = document.getElementById('product-name').value;

        if (!barcode) {
            alert("Silakan scan barcode terlebih dahulu!");
            return;
        }
        if (!namaBarang.trim()) {
            alert("Nama barang tidak boleh kosong!");
            return;
        }

        // Ambil database lama atau buat baru jika belum ada
        let savedData = localStorage.getItem('barang_data');
        let database = savedData ? JSON.parse(savedData) : {};

        // Masukkan data baru (Format: { "KODE_BARCODE": "Nama Barang" })
        database[barcode] = namaBarang;

        // Simpan kembali ke LocalStorage
        localStorage.setItem('barang_data', JSON.stringify(database));

        document.getElementById('status-message').innerText = "Data berhasil disimpan!";
        document.getElementById('status-message').style.color = "#28a745";
        
        // Opsional: reset form setelah simpan jika ingin scan barang lain
        setTimeout(() => {
            document.getElementById('barcode-result').value = "";
            document.getElementById('product-name').value = "";
            document.getElementById('status-message').innerText = "";
        }, 2000);
    }

    // Menjalankan Kamera Scanner otomatis saat halaman dibuka
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: {width: 250, height: 150} }
    );
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
