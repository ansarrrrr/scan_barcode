<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Barcode Barang + Status di Atas</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #reader {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .form-group {
            margin-top: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
        
        /* STYLE BARU: Desain Kotak Status Pesan */
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            display: none; /* Tersembunyi di awal, muncul via JavaScript */
        }
        
        /* Style Tabel */
        .table-section {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #fafafa;
        }
        .no-data {
            text-align: center;
            color: #999;
            font-style: italic;
        }
        .btn-clear {
            background-color: #dc3545;
            margin-top: 10px;
            padding: 8px;
            font-size: 14px;
        }
        .btn-clear:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner & Input Barang</h2>
    
    <div id="reader"></div>
    
    <div id="status-message" class="status"></div>

    <div class="form-group">
        <label for="barcode-result">Hasil Scan (Kode Barcode):</label>
        <input type="text" id="barcode-result" readonly placeholder="Scan barcode untuk mengisi...">
    </div>

    <div class="form-group">
        <label for="product-name">Nama Barang:</label>
        <input type="text" id="product-name" placeholder="Masukkan nama barang...">
    </div>

    <div class="form-group">
        <label for="product-price">Harga Barang (Rp):</label>
        <input type="text" id="product-price" placeholder="Contoh: 50.000">
    </div>

    <button id="save-btn" onclick="saveData()">Simpan Data Barang</button>

    <div class="table-section">
        <h3>Daftar Barang Tersimpan</h3>
        <table>
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Kode Barcode</th>
                    <th>Nama Barang</th>
                    <th>Harga</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
        <button class="btn-clear" onclick="clearAllData()">Hapus Semua Data Tabel</button>
    </div>
</div>

<script>
    let activeBarcode = "";

    // Fungsi Menghasilkan suara Beep secara digital
    function playBeepSound() {
        try {
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine'; 
            oscillator.frequency.value = 800; 
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
        } catch (error) {
            console.log("Gagal memutar audio: ", error);
        }
    }

    // Otomatis Mengubah Angka Menjadi Format Rupiah Berbintik (.) saat Diketik
    const priceInput = document.getElementById('product-price');
    priceInput.addEventListener('input', function(e) {
        let numberString = this.value.replace(/[^,\d]/g, '').toString();
        let split = numberString.split(',');
        let sisa = split[0].length % 3;
        let rupiah = split[0].substr(0, sisa);
        let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

        if (ribuan) {
            let separator = sisa ? '.' : '';
            rupiah += separator + ribuan.join('.');
        }

        rupiah = split[1] != undefined ? rupiah + ',' + split[1] : rupiah;
        this.value = rupiah;
    });

    // Fungsi menampilkan pesan status dengan warna latar belakang yang sesuai
    function showStatus(text, type) {
        const statusEl = document.getElementById('status-message');
        statusEl.innerText = text;
        statusEl.style.display = 'block';

        if (type === 'success') {
            statusEl.style.backgroundColor = '#d4edda';
            statusEl.style.color = '#155724';
            statusEl.style.border = '1px solid #c3e6cb';
        } else if (type === 'info') {
            statusEl.style.backgroundColor = '#cce5ff';
            statusEl.style.color = '#004085';
            statusEl.style.border = '1px solid #b8daff';
        } else if (type === 'warning') {
            statusEl.style.backgroundColor = '#fff3cd';
            statusEl.style.color = '#856404';
            statusEl.style.border = '1px solid #ffeeba';
        }
    }

    // Fungsi otomatis saat scan berhasil
    function onScanSuccess(decodedText, decodedResult) {
        if (activeBarcode !== decodedText) {
            activeBarcode = decodedText;
            
            playBeepSound(); 

            document.getElementById('barcode-result').value = decodedText;
            
            let savedData = localStorage.getItem('barang_data_v2');
            let database = savedData ? JSON.parse(savedData) : {};

            if (database[decodedText]) {
                document.getElementById('product-name').value = database[decodedText].nama;
                document.getElementById('product-price').value = database[decodedText].harga;
                showStatus("Barang ditemukan di sistem!", "info");
            } else {
                document.getElementById('product-name').value = "";
                document.getElementById('product-price').value = "";
                document.getElementById('product-name').focus();
                showStatus("Barcode baru terdeteksi. Silakan input nama & harga.", "warning");
            }
        }
    }

    // Fungsi menampilkan data ke Tabel
    function updateTable() {
        let savedData = localStorage.getItem('barang_data_v2');
        let database = savedData ? JSON.parse(savedData) : {};
        let tableBody = document.getElementById('table-body');
        
        tableBody.innerHTML = "";

        let barcodes = Object.keys(database);

        if (barcodes.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" class="no-data">Belum ada data barang disimpan.</td></tr>`;
            return;
        }

        barcodes.forEach((barcode, index) => {
            let row = `<tr>
                <td>${index + 1}</td>
                <td><strong>${barcode}</strong></td>
                <td>${database[barcode].nama}</td>
                <td>Rp ${database[barcode].harga}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    // Fungsi menyimpan data
    function saveData() {
        let barcode = document.getElementById('barcode-result').value;
        let namaBarang = document.getElementById('product-name').value;
        let hargaBarang = document.getElementById('product-price').value;

        if (!barcode) {
            alert("Silakan scan barcode terlebih dahulu!");
            return;
        }
        if (!namaBarang.trim()) {
            alert("Nama barang tidak boleh kosong!");
            return;
        }
        if (!hargaBarang.trim()) {
            alert("Harga barang tidak boleh kosong!");
            return;
        }

        let savedData = localStorage.getItem('barang_data_v2');
        let database = savedData ? JSON.parse(savedData) : {};

        database[barcode] = {
            nama: namaBarang,
            harga: hargaBarang
        };
        
        localStorage.setItem('barang_data_v2', JSON.stringify(database));

        showStatus("Data berhasil disimpan!", "success");
        
        updateTable();

        // Reset form input dan sembunyikan status setelah beberapa detik
        setTimeout(() => {
            document.getElementById('barcode-result').value = "";
            document.getElementById('product-name').value = "";
            document.getElementById('product-price').value = "";
            document.getElementById('status-message').style.display = "none";
            activeBarcode = ""; 
        }, 2000);
    }

    // Fungsi menghapus semua data
    function clearAllData() {
        if (confirm("Apakah Anda yakin ingin menghapus semua data barang?")) {
            localStorage.removeItem('barang_data_v2');
            updateTable();
            document.getElementById('status-message').style.display = "none";
            activeBarcode = "";
        }
    }

    // Menjalankan Kamera Scanner
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: {width: 250, height: 150} }
    );
    html5QrcodeScanner.render(onScanSuccess);

    // Load data tabel saat halaman dibuka
    updateTable();
</script>

</body>
</html>
