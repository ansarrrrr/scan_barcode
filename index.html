<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Barcode Barang + Tabel Data</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #reader {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .form-group {
            margin-top: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #218838;
        }
        .status {
            margin-top: 10px;
            font-style: italic;
            color: #666;
            margin-bottom: 15px;
        }
        
        /* Style Tabel */
        .table-section {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #fafafa;
        }
        .no-data {
            text-align: center;
            color: #999;
            font-style: italic;
        }
        .btn-clear {
            background-color: #dc3545;
            margin-top: 10px;
            padding: 8px;
            font-size: 14px;
        }
        .btn-clear:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner & Input Barang</h2>
    
    <div id="reader"></div>
    
    <div class="form-group">
        <label for="barcode-result">Hasil Scan (Kode Barcode):</label>
        <input type="text" id="barcode-result" readonly placeholder="Scan barcode untuk mengisi...">
    </div>

    <div class="form-group">
        <label for="product-name">Nama Barang:</label>
        <input type="text" id="product-name" placeholder="Masukkan nama barang...">
    </div>

    <button id="save-btn" onclick="saveData()">Simpan Data Barang</button>
    <div id="status-message" class="status"></div>

    <div class="table-section">
        <h3>Daftar Barang Tersimpan</h3>
        <table>
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Kode Barcode</th>
                    <th>Nama Barang</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
        <button class="btn-clear" onclick="clearAllData()">Hapus Semua Data Tabel</button>
    </div>
</div>

<script>
    let activeBarcode = "";

    // Fungsi otomatis saat scan berhasil
    function onScanSuccess(decodedText, decodedResult) {
        activeBarcode = decodedText;
        document.getElementById('barcode-result').value = decodedText;
        
        let savedData = localStorage.getItem('barang_data');
        let database = savedData ? JSON.parse(savedData) : {};

        if (database[decodedText]) {
            document.getElementById('product-name').value = database[decodedText];
            document.getElementById('status-message').innerText = "Barang ditemukan di sistem!";
            document.getElementById('status-message').style.color = "#0056b3";
        } else {
            document.getElementById('product-name').value = "";
            document.getElementById('product-name').focus();
            document.getElementById('status-message').innerText = "Barcode baru terdeteksi. Silakan input nama barang.";
            document.getElementById('status-message').style.color = "#e67e22";
        }
    }

    // Fungsi menampilkan data ke Tabel
    function updateTable() {
        let savedData = localStorage.getItem('barang_data');
        let database = savedData ? JSON.parse(savedData) : {};
        let tableBody = document.getElementById('table-body');
        
        tableBody.innerHTML = "";

        let barcodes = Object.keys(database);

        if (barcodes.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="3" class="no-data">Belum ada data barang disimpan.</td></tr>`;
            return;
        }

        barcodes.forEach((barcode, index) => {
            let row = `<tr>
                <td>${index + 1}</td>
                <td><strong>${barcode}</strong></td>
                <td>${database[barcode]}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    // Fungsi menyimpan data
    function saveData() {
        let barcode = document.getElementById('barcode-result').value;
        let namaBarang = document.getElementById('product-name').value;

        if (!barcode) {
            alert("Silakan scan barcode terlebih dahulu!");
            return;
        }
        if (!namaBarang.trim()) {
            alert("Nama barang tidak boleh kosong!");
            return;
        }

        let savedData = localStorage.getItem('barang_data');
        let database = savedData ? JSON.parse(savedData) : {};

        database[barcode] = namaBarang;
        localStorage.setItem('barang_data', JSON.stringify(database));

        document.getElementById('status-message').innerText = "Data berhasil disimpan!";
        document.getElementById('status-message').style.color = "#28a745";
        
        updateTable();

        // Reset form input
        setTimeout(() => {
            document.getElementById('barcode-result').value = "";
            document.getElementById('product-name').value = "";
            document.getElementById('status-message').innerText = "";
        }, 1500);
    }

    // Fungsi menghapus semua data
    function clearAllData() {
        if (confirm("Apakah Anda yakin ingin menghapus semua data barang?")) {
            localStorage.removeItem('barang_data');
            updateTable();
        }
    }

    // Menjalankan Kamera Scanner
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: {width: 250, height: 150} }
    );
    html5QrcodeScanner.render(onScanSuccess);

    // Load data tabel saat pertama kali file index.html dibuka
    updateTable();
</script>

</body>
</html>
