<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Coba Scan Barcode HTML5</title>
    
    <!-- Memanggil Library QR & Barcode dari CDN Resmi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
        }
        #scanner-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #hasil-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e2f0d9;
            border: 1px solid #385723;
            border-radius: 5px;
            display: none; /* Sembunyikan dulu sebelum ada hasil */
        }
    </style>
</head>
<body>

    <h2>Aplikasi Scan Barcode & QR Code</h2>
    <p>Izinkan akses kamera saat diminta browser untuk memulai.</p>

    <div id="scanner-container">
        <!-- Wadah tempat kamera akan muncul -->
        <div id="reader"></div>
        
        <!-- Wadah untuk menampilkan hasil scan -->
        <div id="hasil-box">
            <strong>Hasil Scan:</strong>
            <p id="hasil-teks" style="word-wrap: break-word; font-size: 18px; color: #385723;"></p>
        </div>
    </div>

    <script>
        // Fungsi yang berjalan otomatis saat barcode berhasil terbaca
        function onScanSuccess(decodedText, decodedResult) {
            // Tampilkan kotak hasil
            document.getElementById('hasil-box').style.display = 'block';
            // Masukkan teks barcode ke dalam halaman web
            document.getElementById('hasil-teks').innerText = decodedText;
            
            // Opsional: Bunyi beep atau alert saat sukses
            alert("Barcode terdeteksi: " + decodedText);
        }

        // Fungsi jika scan gagal/tidak menemukan barcode di frame (biasanya dibiarkan kosong agar tidak spam error)
        function onScanFailure(error) {
            // console.warn(`Scan error: ${error}`);
        }

        // Inisialisasi scanner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10,       // Berapa kali kamera mengambil gambar per detik
                qrbox: { width: 250, height: 250 }, // Ukuran kotak pemindai di layar
                rememberLastUsedCamera: true // Mengingat kamera terakhir yang digunakan
            }, 
            /* verbose= */ false
        );
        
        // Jalankan scanner
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>

</body>
</html>
